  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
  }
  h1 { font-size: 42px; font-weight: normal; font-family: 'JandaManatee', cursive; color: #444441; margin-bottom: 2rem; letter-spacing: 0.02em; }
  .layout {
    display: flex;
    flex-wrap: wrap;
    gap: 2rem;
    justify-content: center;
    align-items: flex-start;
    width: 100%;
    max-width: 860px;
  }
  .sidebar { flex: 1; min-width: 220px; max-width: 260px; display: flex; flex-direction: column; gap: 1.5rem; }
  .editor-label {
    font-size: 20px; font-weight: normal; font-family: 'JandaManatee', cursive;
    letter-spacing: 0.04em; color: #888780; margin-bottom: 10px;
  }
  .items-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .item-row { display: flex; gap: 6px; align-items: center; }
  .item-row input {
    flex: 1; font-size: 14px; padding: 8px 10px;
    border: 0.5px solid #ccc; border-radius: 8px;
    background: #fff; color: #1a1a18; outline: none; font-family: inherit;
  }
  .item-row input:focus { border-color: #888; }
  .remove-btn {
    background: none; border: none; cursor: pointer;
    color: #aaa; font-size: 18px; line-height: 1; padding: 4px 6px; border-radius: 6px;
  }
  .remove-btn:hover { color: #555; background: #eee; }
  .add-btn {
    font-size: 13px; color: #888; background: none;
    border: 0.5px dashed #ccc; border-radius: 8px;
    padding: 8px 12px; cursor: pointer; width: 100%; text-align: left; font-family: inherit;
  }
  .add-btn:hover { background: #eee; }
  .deck-section {}
  .deck-name-row { display: flex; gap: 6px; margin-bottom: 8px; }
  .deck-name-row input {
    flex: 1; font-size: 13px; padding: 7px 10px;
    border: 0.5px solid #ccc; border-radius: 8px;
    background: #fff; color: #1a1a18; outline: none; font-family: inherit;
  }
  .deck-name-row input:focus { border-color: #888; }
  .save-deck-btn {
    font-size: 13px; padding: 7px 14px;
    border: 0.5px solid #ccc; border-radius: 8px;
    background: #fff; color: #1a1a18; cursor: pointer; font-family: inherit; white-space: nowrap;
  }
  .save-deck-btn:hover { background: #f0efe9; }
  .saved-list { display: flex; flex-direction: column; gap: 5px; }
  .saved-item {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 10px; border: 0.5px solid #ddd; border-radius: 8px;
    background: #fff; cursor: pointer; font-size: 13px; color: #1a1a18;
  }
  .saved-item:hover { background: #f0efe9; border-color: #bbb; }
  .saved-item.active { border-color: #534AB7; background: #EEEDFE; color: #3C3489; }
  .saved-item span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .delete-deck-btn {
    background: none; border: none; cursor: pointer;
    color: #aaa; font-size: 15px; line-height: 1; padding: 2px 4px; border-radius: 4px; flex-shrink: 0;
  }
  .delete-deck-btn:hover { color: #c00; background: #fee; }
  .no-decks { font-size: 13px; color: #aaa; }
  .wheel-area { display: flex; flex-direction: column; align-items: center; gap: 1.2rem; }
  .wheel-wrap { position: relative; width: 400px; height: 400px; }
  #wheel { width: 400px; height: 400px; border-radius: 50%; }
  .pointer {
    position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 14px solid transparent; border-right: 14px solid transparent;
    border-top: 28px solid #2c2c2a;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
  }
  .spin-btn {
    font-size: 15px; font-weight: 500; padding: 12px 44px;
    border: 0.5px solid #ccc; border-radius: 999px;
    background: #fff; color: #1a1a18; cursor: pointer; font-family: inherit; letter-spacing: 0.01em;
  }
  .spin-btn:hover { background: #f0efe9; }
  .spin-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .result { font-size: 26px; font-weight: normal; font-family: 'KGPerfectPenmanship', cursive; color: #1a1a18; min-height: 34px; text-align: center; transition: opacity 0.3s; }
  .result.hidden { opacity: 0; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #2c2c2a; color: #fff; font-size: 13px; padding: 8px 18px;
    border-radius: 999px; opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<h1>Activity Spinner</h1>
<div class="layout">
  <div class="sidebar">
    <div class="editor">
      <div class="editor-label">Activities</div>
      <div class="items-list" id="items-list"></div>
      <button class="add-btn" onclick="addItem()">+ Add activity</button>
    </div>
    <div class="deck-section">
      <div class="editor-label">Saved decks</div>
      <div class="deck-name-row">
        <input type="text" id="deck-name" placeholder="Deck name…" />
        <button class="save-deck-btn" onclick="saveDeck()">Save</button>
      </div>
      <div class="saved-list" id="saved-list"></div>
    </div>
  </div>

  <div class="wheel-area">
    <div class="wheel-wrap">
      <canvas id="wheel" width="400" height="400"></canvas>
      <div class="pointer"></div>
    </div>
    <button class="spin-btn" id="spin-btn" onclick="spin()">Spin</button>
    <div class="result hidden" id="result"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>

const TEXT_C = ['#3C3489','#085041','#712B13','#72243E','#0C447C','#27500A','#633806','#791F1F'];

const SIZE = 400;
const CX = SIZE / 2, CY = SIZE / 2, R = SIZE / 2 - 4;

let items = ['Read aloud','Word sort','Flashcards','Whiteboard','Build a word','Partner quiz'];
let spinning = false;
let currentAngle = 0;
let activeDeckName = null;
let audioCtx = null;
let lastTickAngle = 0;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTick(volume) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(1200, ctx.currentTime);
    gain.gain.setValueAtTime(Math.min(volume, 0.35), ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.04);
  } catch(e) {}
}

function playWinSound() {
  try {
    const ctx = getAudioCtx();
    [523, 659, 784, 1047].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.1);
      gain.gain.setValueAtTime(0.2, ctx.currentTime + i * 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.25);
      osc.start(ctx.currentTime + i * 0.1);
      osc.stop(ctx.currentTime + i * 0.1 + 0.25);
    });
  } catch(e) {}
}

function renderList() {
  const list = document.getElementById('items-list');
  list.innerHTML = '';
  items.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'item-row';
    const input = document.createElement('input');
    input.type = 'text'; input.value = item;
    input.addEventListener('input', () => { items[i] = input.value; drawWheel(); });
    const btn = document.createElement('button');
    btn.className = 'remove-btn'; btn.textContent = '×';
    btn.setAttribute('aria-label', 'Remove');
    btn.addEventListener('click', () => removeItem(i));
    row.appendChild(input); row.appendChild(btn);
    list.appendChild(row);
  });
  drawWheel();
}

function addItem() {
  items.push(''); renderList();
  const inputs = document.querySelectorAll('.item-row input');
  inputs[inputs.length - 1].focus();
}

function removeItem(i) {
  if (items.length <= 2) return;
  items.splice(i, 1); renderList();
}

function drawWheel(highlightIndex = -1) {
  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, SIZE, SIZE);
  const valid = items.filter(s => s.trim());
  if (!valid.length) return;
  const arc = (2 * Math.PI) / valid.length;

  valid.forEach((label, i) => {
    // Start segments at top (12 o'clock = -PI/2)
    const start = i * arc - Math.PI / 2;
    const end = start + arc;
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, start, end);
    ctx.closePath();
    ctx.fillStyle = highlightIndex === i ? STROKE[i % STROKE.length] : COLORS[i % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(start + arc / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = highlightIndex === i ? '#fff' : TEXT_C[i % TEXT_C.length];
    const fontSize = valid.length > 8 ? 16 : valid.length > 5 ? 19 : 22;
    ctx.font = `${fontSize}px 'Fredoka One', 'Nunito', cursive`;
    const maxW = R - 30;
    let text = label;
    if (ctx.measureText(text).width > maxW) {
      while (ctx.measureText(text + '…').width > maxW && text.length > 1) text = text.slice(0, -1);
      text += '…';
    }
    ctx.fillText(text, R - 12, fontSize / 3);
    ctx.restore();
  });

  // Center dot
  ctx.beginPath();
  ctx.arc(CX, CY, 22, 0, 2 * Math.PI);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1; ctx.stroke();
}

function getWinnerIndex(angleDeg, numItems) {
  // Pointer is at top (0°). Wheel rotates clockwise by angleDeg.
  // Segment 0 starts at top. We need which segment is now under the top pointer.
  const segDeg = 360 / numItems;
  // Normalize the rotation so we know how far segment 0 has moved
  const norm = ((angleDeg % 360) + 360) % 360;
  // The segment under the pointer is the one that has rotated to the top
  const index = Math.floor(((360 - norm) % 360) / segDeg) % numItems;
  return index;
}

function spin() {
  if (spinning) return;
  const valid = items.filter(s => s.trim());
  if (valid.length < 2) return;
  spinning = true;
  getAudioCtx();
  const btn = document.getElementById('spin-btn');
  btn.disabled = true;
  const resultEl = document.getElementById('result');
  resultEl.className = 'result hidden';

  const extraSpins = (6 + Math.floor(Math.random() * 5)) * 360;
  const targetDeg = Math.random() * 360;
  const totalDeg = extraSpins + targetDeg;
  const duration = 3500 + Math.random() * 1000;
  const startAngle = currentAngle;
  const startTime = performance.now();
  lastTickAngle = currentAngle;
  const segmentDeg = 360 / valid.length;

  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

  function frame(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    currentAngle = startAngle + totalDeg * easeOut(progress);

    const angleDiff = currentAngle - lastTickAngle;
    if (angleDiff >= segmentDeg) {
      const speed = (angleDiff / 16);
      playTick(Math.min(speed / 12, 0.35));
      lastTickAngle = currentAngle;
    }

    document.getElementById('wheel').style.transform = `rotate(${currentAngle}deg)`;

    if (progress < 1) {
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      btn.disabled = false;
      const winnerIndex = getWinnerIndex(currentAngle, valid.length);
      drawWheel(winnerIndex);
      document.getElementById('wheel').style.transform = `rotate(${currentAngle}deg)`;
      resultEl.textContent = valid[winnerIndex];
      resultEl.className = 'result';
      playWinSound();
    }
  }
  requestAnimationFrame(frame);
}

function getDecks() {
  try { return JSON.parse(localStorage.getItem('spinner_decks') || '{}'); } catch(e) { return {}; }
}
function setDecks(decks) { localStorage.setItem('spinner_decks', JSON.stringify(decks)); }

function saveDeck() {
  const nameInput = document.getElementById('deck-name');
  const name = nameInput.value.trim();
  if (!name) { showToast('Enter a deck name first'); return; }
  const valid = items.filter(s => s.trim());
  if (valid.length < 2) { showToast('Add at least 2 activities'); return; }
  const decks = getDecks();
  decks[name] = [...valid];
  setDecks(decks);
  activeDeckName = name;
  nameInput.value = '';
  renderDecks();
  showToast(`Saved "${name}"`);
}

function loadDeck(name) {
  const decks = getDecks();
  if (!decks[name]) return;
  items = [...decks[name]];
  activeDeckName = name;
  currentAngle = 0;
  document.getElementById('wheel').style.transform = 'rotate(0deg)';
  document.getElementById('result').className = 'result hidden';
  renderList(); renderDecks();
}

function deleteDeck(name) {
  const decks = getDecks();
  delete decks[name];
  setDecks(decks);
  if (activeDeckName === name) activeDeckName = null;
  renderDecks();
  showToast(`Deleted "${name}"`);
}

function renderDecks() {
  const container = document.getElementById('saved-list');
  const decks = getDecks();
  const names = Object.keys(decks);
  container.innerHTML = '';
  if (!names.length) {
    container.innerHTML = '<div class="no-decks">No saved decks yet</div>';
    return;
  }
  names.forEach(name => {
    const row = document.createElement('div');
    row.className = 'saved-item' + (name === activeDeckName ? ' active' : '');
    const label = document.createElement('span');
    label.textContent = name; label.title = name; label.style.cursor = 'pointer';
    label.addEventListener('click', () => loadDeck(name));
    const del = document.createElement('button');
    del.className = 'delete-deck-btn'; del.textContent = '×';
    del.setAttribute('aria-label', 'Delete deck');
    del.addEventListener('click', (e) => { e.stopPropagation(); deleteDeck(name); });
    row.appendChild(label); row.appendChild(del);
    container.appendChild(row);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

renderList();
renderDecks();
</script>
</body>
</html>
